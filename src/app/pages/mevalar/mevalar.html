<h1>Mevalar ro'yxati</h1>

<div class="flex gap-3">
  <input class="inp" [(ngModel)]="yangi_nomi" placeholder="Meva nomi" />
  <input class="inp" [(ngModel)]="yangi_rangi" placeholder="Rangi" />
  <input class="inp" type="number" [(ngModel)]="yangi_narxi" placeholder="Narxi" />
  <button (click)="qoshish()">Qo'shish</button>
</div>

@for (meva of mevaService.mevalar; track meva.nomi; let ind = $index) {
  <app-meva-card
    [nomi]="meva.nomi"
    [rangi]="meva.rangi"
    [narxi]="meva.narxi"
    (ochirildi)="ochirish(ind)"
    (savatgaqoshildi)="savatgaQoshish(meva)"
  >
  </app-meva-card>
}
